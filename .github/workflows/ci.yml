name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type-check (pyright)
        run: pyright app
        continue-on-error: true  # advisory until we achieve strict compliance

      - name: Test (pytest)
        env:
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY || 'dGVzdC1rZXktMzItY2hhcnMtbG9uZy1mb3ItY2k=' }}
          AUTH_DEV_BYPASS: "true"
          DATABASE_URL: ""
          REDIS_URL: ""
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
